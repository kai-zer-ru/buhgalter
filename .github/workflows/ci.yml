name: ci

on:
  push:
  pull_request:

jobs:
  lint-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: server/go.sum
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: golangci-lint run ./...

  test-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: server/go.sum
      - run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.31.1
      - run: make sqlc-check openapi-check
      - run: go test ./...
        working-directory: server

  test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: python3 scripts/build_category_icons_json.py
        working-directory: ${{ github.workspace }}
      - run: npm ci
      - run: npm run check

  lint-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: python3 scripts/build_category_icons_json.py
        working-directory: ${{ github.workspace }}
      - run: npm ci
      - run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: [lint-go, test-go, test-web, lint-web]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: python3 scripts/build_category_icons_json.py
      - run: make build

  docker-build:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: docker/setup-buildx-action@v3
      - run: make docker-build VERSION=ci-${{ github.sha }} BUILD_COMMIT=${{ github.sha }} DOCKER_IMAGE_TAG=buhgalter:ci

  test-e2e:
    runs-on: ubuntu-latest
    needs: [build]
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          clean: false
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
          cache-dependency-path: server/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: python3 scripts/build_category_icons_json.py
      - run: make build
      - run: make test-e2e
