name: Issue area labels

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  area-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const mapping = JSON.parse(
              fs.readFileSync('.github/area-labels.json', 'utf8')
            );

            const body = context.payload.issue.body ?? '';
            const match = body.match(/^### Область\s*\n+\s*(.+?)\s*$/m);
            if (!match) {
              core.info('Поле «Область» не найдено — label не добавлен');
              return;
            }

            const selected = match[1].trim();
            const entry = mapping[selected];
            if (!entry) {
              core.info(`Для «${selected}» area-label не задан`);
              return;
            }

            const { owner, repo } = context.repo;
            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: entry.name,
                color: entry.color,
                description: entry.description,
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: context.payload.issue.number,
              labels: [entry.name],
            });

            core.info(`Добавлен label: ${entry.name}`);
