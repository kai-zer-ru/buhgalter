            application/json:
              schema:
                $ref: '#/components/schemas/Credit'
  /credits/schedule/preview:
    post:
      summary: Предпросмотр графика платежей
      description: |
        Рассчитывает график без сохранения кредита. Ответ: `schedule_preview`, `calculated_monthly_payment`
        и `calculated_monthly_payment_display`.

        **Потребительский кредит** (`credit_kind=consumer`, по умолчанию):
        - для `month` / `week` / `two_weeks` — аннуитет от `issue_date`; платежи 1…N−1 равны,
          последний закрывает остаток + проценты за период;
        - опциональный `monthly_payment` переопределяет расчётный платёж; если сумма совпадает с расчётной
          в пределах 1 ₽ (копейки), трактуется как автоматическая;
        - слишком низкий ручной платёж (не покрывает проценты) или слишком высокий (не укладывается в срок)
          → **400** `VALIDATION_ERROR`, ключ `ERR_CREDIT_INVALID_PAYMENT`, поле `error.field=monthly_payment`;
        - для `manual` — только переданные `seed_payments` (ровно `term` строк; сумма подгоняется последним платежом).

        **Ипотека** (`credit_kind=mortgage`):
        - для ипотеки поддерживается только периодичность `month`;
        - автоматический платёж: ежедневное начисление процентов, бинарный поиск равного платежа;
          платежи 1…N−1 равны `calculated_monthly_payment`, последний — остаток + проценты;
        - ручной `monthly_payment` (например из договора банка): платежи 1…N−1 равны введённой сумме,
          последний закрывает положительный остаток или повторяет введённую сумму; отклонение «слишком высокий»
          для ипотеки **не применяется**;
        - сумма кредита (`principal`) для ипотеки — уже `property_price - down_payment` (поля mortgage в preview не передаются).
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreviewScheduleRequest'
      responses:
        '200':
          description: График без сохранения
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewScheduleResponse'
        '400':
          description: Ошибка валидации параметров графика
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                invalidPayment:
                  summary: Некорректный ежемесячный платёж (consumer)
                  value:
                    error:
                      code: VALIDATION_ERROR
                      message: Некорректный ежемесячный платёж
                      field: monthly_payment
  /credits/{id}:
    get:
      summary: Детали кредита
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
