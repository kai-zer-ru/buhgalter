          description: Должник с долгами и операциями
        '404':
          description: Не найден
  /debts/{id}:
    delete:
      summary: Удалить долг
      description: |
        Удаляет запись долга и **все** связанные операции (`debt_transactions`).
        Баланс счёта пересчитывается без этих операций.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалён
        '404':
          description: Не найден
  /debts/{id}/settle:
    post:
      summary: Погасить долг (полностью или частично)
      description: |
        Закрывает долг полностью или уменьшает сумму (частичное погашение).

        **`affects_balance` и `account_id` задаются в запросе** и не обязаны совпадать с флагом долга
        при создании. При `affects_balance=true` создаётся обратная операция в категории «Долги»
        (`income` для `lent`, `expense` для `borrowed`) и запись `settle` в `debt_transactions`;
        `account_id` обязателен. При `affects_balance=false` долг закрывается или уменьшается без
        операции по счёту.

        Опциональное поле `amount` — частичное погашение (строка с рублями, как при создании долга);
        если не указано — погашается остаток целиком.

        В веб-клиенте: переключатель «Не учитывать в балансе» (по умолчанию выключен), затем счёт;
        счёт по умолчанию — `account_id` долга или основной счёт пользователя.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettleDebtRequest'
      responses:
        '200':
          description: Обновлённый долг
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Debt'
        '400':
          description: Некорректная сумма, дата или отсутствует account_id при affects_balance=true
        '404':
          description: Не найден
        '409':
          description: Долг уже закрыт или некорректная сумма погашения
  /credits:
    get:
      summary: Список кредитов
      description: Фильтр `?status=active` или `?status=closed`
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed]
      responses:
        '200':
