          type: string
          nullable: true
          description: Счёт для списания первоначального взноса; используется только если down_payment_affects_balance=true. Если не указан, используется debit_account_id
        issue_date:
          type: string
        term_months:
          type: integer
        interest_rate:
          type: number
        payment_interval:
          type: string
          enum: [month, week, two_weeks, manual]
          description: Для credit_kind=mortgage допустимо только значение month
        paid_amount:
          oneOf:
            - type: string
            - type: integer
        monthly_payment:
          nullable: true
          oneOf:
            - type: string
            - type: integer
          description: |
            Опциональный ежемесячный платёж (копейки). Для consumer — override расчётного с проверкой
            min/max; для mortgage — сумма из договора банка без отклонения «слишком высокий».
            Совпадение с расчётным в пределах 1 ₽ трактуется как автоматический платёж.
        debit_account_id:
          type: string
        debit_time_local:
          type: string
          nullable: true
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: Локальное время автосписания в формате HH:MM; null/пусто отключает автосписание; в UI по умолчанию 08:00
        bank_id:
          type: string
          nullable: true
