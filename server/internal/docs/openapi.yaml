              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Не найдена
  /transfers:
    post:
      summary: Создать перевод
      description: Атомарно две записи с одним `transfer_group_id`; исходящая нога создаётся первой (`created_at` +1 ms у входящей).
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferCreate'
      responses:
        '201':
          description: Перевод создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '400':
          description: Ошибка валидации (тот же счёт, сумма и т.д.)
  /transfers/{group_id}:
    put:
      summary: Обновить перевод
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferCreate'
      responses:
        '200':
          description: Перевод обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transfer'
        '404':
          description: Не найден
    delete:
      summary: Удалить перевод
      description: Удаляет обе ноги по `group_id`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалён
        '404':
          description: Не найден
  /import/headers:
    post:
      summary: Заголовки колонок файла (для custom mapping)
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Список заголовков первой строки
          content:
            application/json:
              schema:
                type: object
                properties:
                  headers:
                    type: array
                    items:
                      type: string
  /import/preview:
    post:
      summary: Превью импорта (dry-run)
      description: Парсит CSV/XLSX, не пишет в БД.
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                preset:
                  type: string
                  enum: [cubux, custom]
                  default: cubux
                deduplicate:
                  type: boolean
                  default: true
                column_map:
                  type: string
                  description: JSON column mapping (custom preset)
      responses:
        '200':
          description: Отчёт превью
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportReport'
  /import:
    post:
      summary: Импорт операций (commit)
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
          description: Повтор с тем же ключом возвращает сохранённый отчёт без дублей
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, confirm]
              properties:
                file:
                  type: string
                  format: binary
                preset:
                  type: string
                  enum: [cubux, custom]
                deduplicate:
                  type: boolean
                confirm:
                  type: boolean
                  description: Должно быть true
                column_map:
                  type: string
                account_map:
                  type: string
                  description: JSON — сопоставление имён счетов из файла
                category_map:
                  type: string
                  description: JSON — сопоставление категорий из файла (ключ «имя|expense» или «имя|income»)
                auto_subcategory:
                  type: boolean
                  description: Автоматический подбор подкатегорий (по умолчанию true)
                subcategory_map:
                  type: string
                  description: JSON — сопоставление подкатегорий (ключ «категория|type|подкатегория»)
      responses:
        '200':
          description: Отчёт импорта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportReport'
  /import/jobs:
    post:
      summary: Импорт операций в фоне (async job)
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: Idempotency-Key
          in: header
          schema:
            type: string
          description: Повтор с тем же ключом возвращает ту же задачу/результат без дублей
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                preset:
                  type: string
                  enum: [cubux, custom]
                deduplicate:
                  type: boolean
                column_map:
                  type: string
                account_map:
                  type: string
                category_map:
                  type: string
                auto_subcategory:
                  type: boolean
                subcategory_map:
                  type: string
      responses:
        '202':
          description: Задача импорта создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
  /import/jobs/{id}:
    get:
      summary: Статус async задачи импорта
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Текущее состояние задачи
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportJob'
        '404':
          description: Задача не найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                not_found:
                  $ref: '#/components/examples/ApiErrorNotFound'
  /export:
    get:
      summary: Экспорт операций в Cubux CSV
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: account_id
          in: query
          schema:
            type: string
        - name: category_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: CSV с BOM
          content:
            text/csv:
              schema:
                type: string
                format: binary
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    StatsFrom:
      name: from
      in: query
      schema:
        type: string
      description: Начало периода (UTC, `YYYY-MM-DD HH:MM:SS`)
    StatsTo:
      name: to
      in: query
      schema:
        type: string
      description: Конец периода (UTC)
    StatsType:
      name: type
      in: query
      schema:
        type: string
        enum: [income, expense]
    StatsAccountId:
      name: account_id
      in: query
      schema:
        type: string
    StatsCategoryId:
      name: category_id
      in: query
      schema:
        type: string
    StatsKind:
      name: kind
      in: query
      schema:
        type: string
        enum: [manual, future]
    StatsSearch:
      name: search
      in: query
      schema:
        type: string
      description: Подстрока в description (фильтр сводки, не путать с `q` в `/stats/search`)
    StatsIncludeFuture:
      name: include_future
      in: query
      schema:
        type: boolean
        default: false
      description: Учитывать операции `kind=future` в сводке (`true` / `1`)
  examples:
    ApiErrorValidation:
      summary: Ошибка валидации (общая)
      value:
        error:
          code: VALIDATION_ERROR
          message: Некорректные параметры запроса
    ApiErrorPasswordUnchanged:
      summary: Новый пароль совпадает с текущим
      value:
        error:
          code: VALIDATION_ERROR
          message: Новый пароль должен отличаться от текущего
    ApiErrorTokenNameRequired:
      summary: Имя API-токена не указано
      value:
        error:
          code: VALIDATION_ERROR
          message: Имя токена обязательно
    ApiErrorTokenExpires:
      summary: Некорректная дата истечения API-токена
      value:
        error:
          code: VALIDATION_ERROR
          message: Некорректная дата истечения
    ApiErrorNotificationChannel:
      summary: Канал уведомлений не настроен
      value:
        error:
          code: VALIDATION_ERROR
          message: Канал уведомлений не настроен
    ApiErrorExternalURL:
      summary: Некорректный external_url
      value:
        error:
          code: VALIDATION_ERROR
          message: external_url должен начинаться с http:// или https://
    ApiErrorSecretKeyInvalid:
      summary: Некорректный ключ шифрования
      value:
        error:
          code: VALIDATION_ERROR
          message: Ключ должен содержать ровно 32 символа
    ApiErrorRestoreConfirm:
      summary: Подтверждение восстановления
      value:
        error:
          code: VALIDATION_ERROR
          message: Для восстановления введите RESTORE
    ApiErrorNotFound:
      summary: Ресурс не найден
      value:
        error:
          code: NOT_FOUND
          message: Не найдено
    ApiErrorInternal:
      summary: Внутренняя ошибка сервера
      value:
        error:
          code: INTERNAL_ERROR
          message: Внутренняя ошибка сервера
    ApiErrorAlreadyConfigured:
      summary: Начальная настройка уже выполнена
      value:
        error:
          code: ALREADY_CONFIGURED
          message: Начальная настройка уже выполнена
  schemas:
    HealthResponse:
      type: object
      required: [status, version, db]
      properties:
        status:
          type: string
          enum: [ok, error]
          description: Состояние приложения
        version:
          type: string
          description: Версия сборки (`-ldflags "-X main.version=…"`)
        db:
          type: string
          enum: [connected, error]
          description: Результат ping SQLite
    VersionCheckResponse:
      type: object
      required: [current_version, update_available]
      properties:
        current_version:
          type: string
          description: Версия текущей установки
        latest_version:
          type: string
          description: Последняя версия на GitHub (если удалось получить)
        update_available:
          type: boolean
          description: true, если latest_version новее current_version
        release_url:
          type: string
          format: uri
          description: Ссылка на страницу релиза на GitHub
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              description: |
                Код ошибки: UNAUTHORIZED, FORBIDDEN, INVALID_CREDENTIALS, REGISTRATION_DISABLED,
                USER_PENDING_MODERATION, USER_BANNED, USER_STATUS_INVALID, USER_STATUS_TRANSITION,
                RATE_LIMITED, VALIDATION_ERROR, INTERNAL_ERROR, NOT_FOUND, CONFLICT,
                ALREADY_CONFIGURED, SERVICE_UNAVAILABLE.
                Для смены пароля и большинства 400 — `VALIDATION_ERROR`; текст в `message`
                локализуется по ключам (PASSWORDS_MISMATCH, ERR_CHANNEL, ERR_SYSTEM_CATEGORY_PLANNED,
                ERR_TX_TYPE_CHANGE, ERR_CREDIT_INVALID_PAYMENT, ERR_CREDIT_INVALID_TERM, ERR_CREDIT_INVALID_MORTGAGE, …).
            message:
              type: string
              description: Локализованное сообщение (заголовок Accept-Language)
            field:
              type: string
              description: |
                Опциональное имя поля запроса для привязки ошибки в форме (например `monthly_payment`,
                `term_months`, `debit_time_local`, `credit_kind`, `property_price`, `body`).
                Заполняется для ключей `ERR_CREDIT_*`, `ERR_INVALID_*`, `ERR_ACCOUNT_*` и аналогичных.
      example:
        error:
          code: VALIDATION_ERROR
          message: Некорректные параметры запроса
          field: monthly_payment
    User:
      type: object
      required: [id, login, display_name, is_admin, status, language, currency, timezone, theme]
      properties:
        id:
          type: string
        login:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        status:
          type: string
          enum: [active, pending, banned]
        language:
          type: string
        currency:
          type: string
        timezone:
          type: string
        theme:
          type: string
    AdminUser:
      type: object
      required: [id, login, display_name, is_admin, status, created_at]
      properties:
        id:
          type: string
        login:
          type: string
        display_name:
          type: string
        is_admin:
          type: boolean
        status:
          type: string
          enum: [active, pending, banned]
        created_at:
          type: string
    AdminSettings:
      type: object
      required: [registration_enabled, external_url, secret_key_set]
      properties:
        registration_enabled:
          type: boolean
        external_url:
          type: string
          nullable: true
        secret_key_set:
          type: boolean
          description: true, если `notification_secret_key` задан в БД
    AdminSettingsUpdate:
      type: object
      required: [registration_enabled, external_url]
      properties:
        registration_enabled:
          type: boolean
        external_url:
          type: string
    AdminNotificationSecretKeyUpdate:
      type: object
      required: [notification_secret_key]
      properties:
        notification_secret_key:
          type: string
          minLength: 32
          maxLength: 32
          description: |
            Новый ключ шифрования уведомлений (set-only; в ответах никогда не возвращается).
            Ровно 32 символа.
    AdminDiagnostics:
      type: object
      required:
        - app_version
        - build_commit
        - build_time
        - db_migration_version
        - install_method
        - go_version
        - os
        - arch
        - uptime_seconds
        - db_size_bytes
        - users_count
        - data_dir
        - log_dir
        - addr
        - static_embed
        - external_url
        - env
      properties:
        app_version:
          type: string
          description: Текущая версия приложения
        build_commit:
          type: string
          description: Commit сборки (ldflags)
        build_time:
          type: string
          description: Время сборки (ldflags)
        db_migration_version:
          type: integer
          description: Текущая версия миграций goose
        install_method:
          type: string
          description: Способ установки (manual/docker/release/dev)
        previous_app_version:
          type: string
          nullable: true
          description: Предыдущая версия приложения при обновлении
        go_version:
          type: string
        os:
          type: string
        arch:
          type: string
        uptime_seconds:
          type: integer
        db_size_bytes:
          type: integer
        users_count:
          type: integer
        data_dir:
          type: string
        log_dir:
          type: string
        addr:
          type: string
        static_embed:
          type: boolean
        external_url:
          type: string
          description: Внешний URL, если настроен reverse proxy
        env:
          type: object
          additionalProperties:
            type: string
          description: Публичные BUHGALTER_* переменные (без секретов)
    NotificationTemplate:
      type: object
      required: [trigger_type, template, placeholders, is_custom]
      properties:
        trigger_type:
          type: string
          enum: [debt_overdue, debt_due_soon, credit_payment, planned_operation, balance_shortfall, budget_threshold, user_registration, password_reset, test]
        template:
          type: string
          description: Текст шаблона
        placeholders:
          type: array
          items:
            type: string
          description: |
            Разрешённые placeholder-ы для trigger_type.
            Для balance_shortfall — только {amount} (недостающая сумма); шаблон добавляется к исходящим уведомлениям при включённом trigger_negative_balance.
            URL-плейсхолдеры формируются из system_settings.external_url; при пустом external_url — текст-подсказка настроить внешний URL в админке:
            debt_url → /debts; credit_url → /credits/{credit_id}; transaction_url → /transactions;
            settings_url → /settings/notifications; reset_url → /admin/users?reset={user_id};
            moderation_url → /admin/users?moderate={user_id}.
        is_custom:
          type: boolean
          description: true, если шаблон задан пользователем в БД
    NotificationSettings:
      type: object
      required:
        [
          secret_key_configured,
          telegram_enabled,
          telegram_configured,
          max_enabled,
          max_configured,
          trigger_debt,
          trigger_credit,
          trigger_planned,
          trigger_negative_balance,
          trigger_budget,
          trigger_user_registration,
          trigger_password_reset,
          debt_days_before,
          my_debt_overdue_days_limit,
          owed_debt_overdue_start_after_days,
          owed_debt_overdue_days_limit,
          credit_days_before,
          notification_time_local,
          templates
        ]
      properties:
        secret_key_configured:
          type: boolean
          description: true, если задан ключ шифрования токенов в админке (system_settings.notification_secret_key)
        telegram_enabled:
          type: boolean
        telegram_configured:
          type: boolean
          description: true, если сохранены токен и chat_id (токен в ответе не возвращается)
        telegram_chat_id:
          type: string
          nullable: true
        max_enabled:
          type: boolean
        max_configured:
          type: boolean
        max_provider:
          type: string
          nullable: true
          enum: [a161, official]
        max_user_id:
          type: integer
          nullable: true
        max_recipient_id:
          type: integer
          nullable: true
        trigger_debt:
          type: boolean
        trigger_credit:
          type: boolean
        trigger_planned:
          type: boolean
        trigger_negative_balance:
          type: boolean
          description: Дописывать к исходящим уведомлениям текст о недостатке средств на счёте
        trigger_budget:
          type: boolean
          description: Уведомления о превышении порога бюджета
        trigger_user_registration:
          type: boolean
          description: Только для администратора — уведомление о новой регистрации
        trigger_password_reset:
          type: boolean
        debt_days_before:
          type: integer
          minimum: 0
          maximum: 30
        my_debt_overdue_days_limit:
          type: integer
          minimum: 0
          maximum: 365
        owed_debt_overdue_start_after_days:
          type: integer
          minimum: 0
          maximum: 365
        owed_debt_overdue_days_limit:
          type: integer
          minimum: 0
          maximum: 365
        credit_days_before:
          type: integer
          minimum: 0
          maximum: 30
        notification_time_local:
          type: string
          description: Локальное время пользователя для ежедневного запуска cron (HH:MM)
          example: "09:30"
        templates:
          type: array
          items:
            $ref: '#/components/schemas/NotificationTemplate'
    NotificationTemplateUpdate:
      type: object
      required: [trigger_type, template]
      properties:
        trigger_type:
          type: string
          enum: [debt_overdue, debt_due_soon, credit_payment, planned_operation, balance_shortfall, budget_threshold, user_registration, password_reset, test]
        template:
          type: string
          minLength: 1
          maxLength: 500
    NotificationSettingsUpdate:
      type: object
      properties:
        telegram_enabled:
          type: boolean
        telegram_bot_token:
          type: string
          description: Новый токен Telegram; шифруется на сервере
        telegram_chat_id:
          type: string
        max_enabled:
          type: boolean
        max_provider:
          type: string
          enum: [a161, official]
        max_token:
          type: string
          description: Новый токен MAX; шифруется на сервере
        max_user_id:
          type: integer
          nullable: true
        max_recipient_id:
          type: integer
          nullable: true
        trigger_debt:
          type: boolean
        trigger_credit:
          type: boolean
        trigger_planned:
          type: boolean
        trigger_negative_balance:
          type: boolean
          description: Дописывать к исходящим уведомлениям текст о недостатке средств на счёте
        trigger_budget:
          type: boolean
          description: Уведомления о превышении порога бюджета
        trigger_user_registration:
          type: boolean
          description: Только для администратора — уведомление о новой регистрации
        trigger_password_reset:
          type: boolean
        debt_days_before:
          type: integer
          minimum: 0
          maximum: 30
        my_debt_overdue_days_limit:
          type: integer
          minimum: 0
          maximum: 365
        owed_debt_overdue_start_after_days:
          type: integer
          minimum: 0
          maximum: 365
        owed_debt_overdue_days_limit:
          type: integer
          minimum: 0
          maximum: 365
        credit_days_before:
          type: integer
          minimum: 0
          maximum: 30
        notification_time_local:
          type: string
          description: Локальное время пользователя для ежедневного запуска cron (HH:MM)
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
        templates:
          type: array
          items:
            $ref: '#/components/schemas/NotificationTemplateUpdate'
    NotificationTestRequest:
      type: object
      required: [channel]
      properties:
        channel:
          type: string
          enum: [telegram, max]
    NotificationPreviewRequest:
      type: object
      required: [trigger_type, template]
      properties:
        trigger_type:
          type: string
          enum: [debt_overdue, debt_due_soon, credit_payment, planned_operation, balance_shortfall, budget_threshold, user_registration, password_reset, test]
        template:
          type: string
          minLength: 1
          maxLength: 500
    NotificationPreviewResponse:
      type: object
      required: [text]
      properties:
        text:
          type: string
    NotificationResetRequest:
      type: object
      properties:
        trigger_type:
          type: string
          enum: [debt_overdue, debt_due_soon, credit_payment, planned_operation, balance_shortfall, budget_threshold, user_registration, password_reset, test]
    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [income, expense]
        icon:
          type: string
          description: ID из data/category_icons.json (например transport, ozon, default)
        sort_order:
          type: integer
          description: Порядок в списке (ручная сортировка в настройках)
        is_primary:
          type: boolean
          description: Главная категория для типа — выбирается по умолчанию при новой операции
        is_system:
          type: boolean
