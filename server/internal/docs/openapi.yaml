openapi: 3.0.3
info:
  title: Бухгалтер API
  description: |
    API приложения «Бухгалтер» для учёта личных финансов.

    Ответы с ошибками (`4xx`, `5xx`) используют объект `error` с полями `code`, `message` и опционально
    **`field`** — имя поля тела запроса для подсветки в форме UI (например `monthly_payment`, `term_months`).
    Схема: `ErrorResponse` → `error.field`.

    **Серверный кеш (in-memory):** успешные ответы `GET` кешируются в процессе сервера (справочники — 5 мин,
    остальное — 1 мин); при любой мутации кеш пользователя сбрасывается. Веб-клиент ответы не хранит.
    Подробнее — [ui-api-cache.md](../ui-api-cache.md).

    **Счета (UI):** на `/accounts` меню «⋯» вызывает inline-редактирование (`PUT /accounts/{id}`),
    `POST /accounts/{id}/primary`, `POST /accounts/{id}/archive`, `DELETE /accounts/{id}`.
    На `/accounts/{id}` — та же форма редактирования в шапке. Поля: название, банк, начальный баланс.
    Подробнее — [ui-row-actions.md](../ui-row-actions.md).
  version: 1.3.0
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Проверка состояния сервера
      description: |
        Публичный healthcheck без авторизации. Минимальный ответ для Docker и балансировщиков.
        Расширенная диагностика — `GET /admin/diagnostics` (только admin).
      responses:
        '200':
          description: Сервер и БД доступны
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: ok
                version: 1.0.0
                db: connected
        '503':
          description: База данных недоступна
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: error
                version: 1.0.0
                db: error
  /setup/status:
    get:
      summary: Статус начальной настройки
      description: |
        Поле `configured` — по файлу-маркеру `BUHGALTER_DATA_DIR/.configured` (по умолчанию `data/.configured`),
        а не по полю `is_configured` в SQLite. Restore бэкапа **не** удаляет маркер.
      responses:
        '200':
          description: Статус настройки
  /setup:
    post:
      summary: Начальная настройка (один раз)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - admin_login
                - admin_display_name
                - admin_password
                - admin_password_confirm
              properties:
                admin_login:
                  type: string
                  minLength: 3
                  maxLength: 32
                  description: Логин администратора
                admin_display_name:
                  type: string
                  minLength: 1
                  maxLength: 64
                  description: Имя администратора (display_name)
                admin_password:
                  type: string
                  minLength: 8
                  description: Минимум 8 символов, хотя бы одна буква и одна цифра, не совпадает с admin_login
                admin_password_confirm:
                  type: string
                  minLength: 8
                  description: Должен совпадать с admin_password
                registration_enabled:
                  type: boolean
                  default: false
                external_url:
                  type: string
                  description: Опционально; URL за reverse proxy (http/https)
      responses:
        '201':
          description: Настройка завершена
        '400':
          description: Ошибка валидации (пароли не совпадают, пустое имя и т.д.)
        '409':
          description: Настройка уже выполнена
  /setup/restore:
    post:
      summary: Восстановить БД до завершения настройки
      description: |
        Доступно до завершения первичной настройки.
        Multipart: поле `file` (`.db`) и `confirm=RESTORE`.
        После восстановления возвращает `configured`:
        - `true` — восстановленная БД уже настроена, можно переходить на `/login`;
        - `false` — завершите первичную настройку на `/setup`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, confirm]
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл SQLite (.db)
                confirm:
                  type: string
                  enum: [RESTORE]
      responses:
        '200':
          description: Восстановление завершено
          content:
            application/json:
              schema:
                type: object
                required: [message, configured]
                properties:
                  message:
                    type: string
                    example: restore_complete
                  configured:
                    type: boolean
        '400':
          description: Некорректный multipart, confirm или файл
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                restore_confirm:
                  $ref: '#/components/examples/ApiErrorRestoreConfirm'
        '409':
          description: Инстанс уже настроен
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                already_configured:
                  $ref: '#/components/examples/ApiErrorAlreadyConfigured'
        '500':
          description: Ошибка восстановления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                internal:
                  $ref: '#/components/examples/ApiErrorInternal'
  /auth/login:
    post:
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                login:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Успешный вход
        '401':
          description: Неверные учётные данные
        '403':
          description: Учётная запись на модерации или заблокирована (USER_PENDING_MODERATION, USER_BANNED)
        '429':
          description: Превышен лимит попыток
  /auth/logout:
    post:
      summary: Выход из системы
      security:
        - sessionCookie: []
      responses:
        '204':
          description: Выход выполнен
  /auth/register:
    post:
      summary: Регистрация пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - password_confirm
              properties:
                login:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 8
                  description: Минимум 8 символов, хотя бы одна буква и одна цифра, не совпадает с login
                password_confirm:
                  type: string
                  minLength: 8
                  description: Должен совпадать с password
                display_name:
                  type: string
                  description: Опционально; по умолчанию — login
      responses:
        '201':
          description: Пользователь создан (статус pending, сессия не выдаётся)
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Ошибка валидации (пароли не совпадают и т.д.)
        '403':
          description: Регистрация отключена
  /auth/verify:
    get:
      summary: Проверка токена
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Результат проверки
  /auth/me:
    get:
      summary: Текущий пользователь
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Данные пользователя
  /user/settings:
    get:
      summary: Настройки пользователя
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки
    put:
      summary: Обновить настройки
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки обновлены
  /user/password:
    put:
      summary: Смена пароля
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - current_password
                - new_password
                - new_password_confirm
              properties:
                current_password:
                  type: string
                new_password:
                  type: string
                  minLength: 8
                  description: Минимум 8 символов, хотя бы одна буква и одна цифра, не совпадает с login
                new_password_confirm:
                  type: string
                  minLength: 8
                  description: Должен совпадать с new_password
      responses:
        '204':
          description: Пароль изменён
        '400':
          description: |
            Ошибка валидации. Код ответа `VALIDATION_ERROR`; тексты сообщений по ключам:
            `PASSWORDS_MISMATCH`, `INVALID_CURRENT_PASSWORD`, `PASSWORD_TOO_SHORT`,
            `PASSWORD_TOO_WEAK`, `PASSWORD_UNCHANGED` (новый пароль совпадает с текущим).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                password_unchanged:
                  $ref: '#/components/examples/ApiErrorPasswordUnchanged'
  /user/tokens:
    get:
      summary: Список API-токенов
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список токенов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/APIToken'
    post:
      summary: Создать API-токен
      description: |
        По умолчанию срок действия — 30 дней. Бессрочный токен (`never_expires: true`) допустим,
        но не рекомендуется. Явная дата в `expires_at` (RFC3339) переопределяет срок по умолчанию.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/APITokenCreateRequest'
      responses:
        '201':
          description: Токен создан (значение `token` показывается один раз)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APITokenCreated'
        '400':
          description: Ошибка валидации (`ERR_TOKEN_NAME_REQUIRED`, `ERR_TOKEN_EXPIRES`)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                token_name_required:
                  $ref: '#/components/examples/ApiErrorTokenNameRequired'
                token_expires:
                  $ref: '#/components/examples/ApiErrorTokenExpires'
  /user/tokens/{id}:
    delete:
      summary: Отозвать API-токен
      description: Можно отозвать только собственный токен; чужой — `404 NOT_FOUND`.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Токен отозван
  /user/notifications:
    get:
      summary: Настройки уведомлений пользователя
      description: |
        Возвращает конфигурацию каналов (Telegram/MAX), триггеры и шаблоны.
        Секреты (`*_token`) в ответе не передаются.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки уведомлений
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
    put:
      summary: Обновить настройки уведомлений и шаблоны
      description: |
        Поля в теле опциональны. Для токенов используется шифрование AES-256-GCM
        (ключ задаётся в админке, `system_settings.notification_secret_key`).
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationSettingsUpdate'
      responses:
        '200':
          description: Обновлённые настройки уведомлений
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
        '400':
          description: Ошибка валидации (неверный trigger_type, placeholder, длина шаблона и т.д.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                validation:
                  $ref: '#/components/examples/ApiErrorValidation'
  /user/notifications/test:
    post:
      summary: Отправить тестовое уведомление
      description: |
        Отправляет тестовый шаблон (`trigger_type=test`) в выбранный канал.
        Поддерживаются каналы `telegram` и `max`.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationTestRequest'
      responses:
        '200':
          description: Тестовое сообщение отправлено
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: sent
        '400':
          description: |
            Канал не настроен или некорректные параметры.
            Код `VALIDATION_ERROR`; сообщения: `ERR_CHANNEL` (неверный канал),
            `ERR_NOTIFICATION_CHANNEL` (канал не настроен), `ERR_INVALID_JSON`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                channel_not_configured:
                  $ref: '#/components/examples/ApiErrorNotificationChannel'
  /user/notifications/templates/preview:
    post:
      summary: Предпросмотр шаблона уведомления
      description: |
        Формирует текст шаблона с тестовыми данными без отправки в мессенджер.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreviewRequest'
      responses:
        '200':
          description: Результат предпросмотра
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPreviewResponse'
        '400':
          description: Ошибка валидации шаблона
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                validation:
                  $ref: '#/components/examples/ApiErrorValidation'
  /user/notifications/templates/reset:
    post:
      summary: Сбросить пользовательские шаблоны уведомлений
      description: |
        Если `trigger_type` не передан — сбрасывает все пользовательские шаблоны.
        Если передан — только для указанного типа.
      security:
        - sessionCookie: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationResetRequest'
      responses:
        '200':
          description: Настройки уведомлений после сброса
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationSettings'
        '400':
          description: Некорректный trigger_type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                validation:
                  $ref: '#/components/examples/ApiErrorValidation'
  /admin/settings:
    get:
      summary: Системные настройки
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
    put:
      summary: Обновить системные настройки
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminSettingsUpdate'
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
        '400':
          description: Ошибка валидации external_url
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                external_url:
                  $ref: '#/components/examples/ApiErrorExternalURL'
  /admin/settings/notification-secret:
    put:
      summary: Обновить ключ шифрования уведомлений
      description: |
        Set-only endpoint: принимает новый `notification_secret_key`, но никогда не возвращает сам ключ.
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminNotificationSecretKeyUpdate'
      responses:
        '200':
          description: Настройки обновлены
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSettings'
        '400':
          description: Ошибка валидации ключа
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                secret_key:
                  $ref: '#/components/examples/ApiErrorSecretKeyInvalid'
  /admin/users:
    get:
      summary: Список пользователей
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Пользователи
    post:
      summary: Создать пользователя
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - login
                - password
                - password_confirm
              properties:
                login:
                  type: string
                  minLength: 3
                  maxLength: 32
                password:
                  type: string
                  minLength: 8
                  description: Минимум 8 символов, хотя бы одна буква и одна цифра, не совпадает с login
                password_confirm:
                  type: string
                  minLength: 8
                  description: Должен совпадать с password
                display_name:
                  type: string
                  description: Опционально; по умолчанию — login
                is_admin:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Пользователь создан
        '400':
          description: Ошибка валидации (пароли не совпадают и т.д.)
  /admin/users/{id}:
    delete:
      summary: Удалить пользователя
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Пользователь удалён
  /admin/users/{id}/status:
    put:
      summary: Изменить статус пользователя
      description: |
        Допустимые переходы: pending→active|banned, active→banned, banned→active.
        Нельзя менять свой статус. При бане сессии пользователя инвалидируются.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, banned]
      responses:
        '200':
          description: Обновлённый пользователь
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUser'
        '400':
          description: Недопустимый статус или переход
        '404':
          description: Пользователь не найден
  /admin/diagnostics:
    get:
      summary: Диагностика системы
      description: |
        Сводная информация для bug report и поддержки. Доступно только администратору.
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Диагностические данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDiagnostics'
        '401':
          description: Требуется авторизация
        '403':
          description: Недостаточно прав
  /admin/backups:
    get:
      summary: Список резервных копий
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Список файлов
  /admin/backups/settings:
    get:
      summary: Настройки резервного копирования
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки
    put:
      summary: Обновить настройки резервного копирования
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Настройки обновлены
  /admin/backups/run:
    post:
      summary: Запустить резервное копирование вручную
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Бэкап создан
  /admin/backups/restore:
    post:
      summary: Восстановить базу из файла
      description: |
        Multipart: поле `file` (`.db`), поле `confirm` = `RESTORE`.
        Перед заменой: WAL checkpoint, удаление `-wal`/`-shm`, `Manager.Reopen()`.
        Сессии из снимка бэкапа недействительны — клиент после успеха выполняет logout.
        Маркер `data/.configured` не затрагивается (setup не повторяется).
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, confirm]
              properties:
                file:
                  type: string
                  format: binary
                  description: Файл SQLite (.db)
                confirm:
                  type: string
                  enum: [RESTORE]
      responses:
        '200':
          description: Восстановление завершено
        '400':
          description: Некорректный multipart или confirm ≠ RESTORE
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                restore_confirm:
                  $ref: '#/components/examples/ApiErrorRestoreConfirm'
        '500':
          description: Ошибка восстановления
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
              examples:
                internal:
                  $ref: '#/components/examples/ApiErrorInternal'
  /admin/backups/download:
    get:
      summary: Скачать последний бэкап
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Файл базы данных
  /admin/backups/{filename}/download:
    get:
      summary: Скачать архивный бэкап
      security:
        - sessionCookie: []
      parameters:
        - name: filename
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Файл базы данных
  /banks:
    get:
      summary: Справочник банков РФ
      description: |
        Статичный справочник. Сервер кеширует ответ in-memory (TTL 5 мин).
      responses:
        '200':
          description: Список банков
  /accounts:
    get:
      summary: Список счетов пользователя
      description: |
        В ответе — актуальный баланс. Сервер кеширует ответ in-memory (TTL 1 мин); сбрасывается при мутациях.

        На странице `/accounts` карточки: меню «⋯» — inline-редактирование (название, банк, начальный баланс),
        основной, архив, удаление (см. `PUT`, `POST .../primary`, `POST .../archive`, `DELETE` для `{id}`).
      security:
        - sessionCookie: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived, deleted]
      responses:
        '200':
          description: Список счетов
    post:
      summary: Создать счёт
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountCreate'
      responses:
        '201':
          description: Счёт создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
  /accounts/{id}:
    get:
      summary: Получить счёт
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Счёт
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
    put:
      summary: Обновить счёт
      description: |
        Имя, банк (для `type=bank` / `credit_card`), лимит и счёт для переводов (для `credit_card`),
        начальный баланс. В UI — inline-форма на `/accounts` или форма на `/accounts/{id}`.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Счёт обновлён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
    delete:
      summary: Удалить счёт
      description: |
        Помечает счёт статусом `deleted` (мягкое удаление): операции и история сохраняются, счёт
        доступен для просмотра на вкладке «Удалённые» и по прямой ссылке `/accounts/{id}`.

        Для счетов `cash` / `bank` с `balance > 0` обязателен `transfer_to_account_id` (query или JSON body):
        перед удалением создаётся перевод всей суммы на указанный активный счёт (категория «Перевод»,
        комментарий `Удаление счёта "{name}"`).

        Для `credit_card` перевод не выполняется. Удаление возможно только при полном погашении
        (`balance >= credit_limit`); иначе `ERR_CREDIT_CARD_ARCHIVE_NOT_FULLY_PAID`.

        В UI — пункт «Удалить» в меню «⋯» на списке `/accounts` и на странице счёта (с подтверждением).
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: transfer_to_account_id
          in: query
          schema:
            type: string
          description: |
            Счёт-приёмник остатка. Обязателен при `balance > 0` у удаляемого счёта `cash` / `bank` (не для `credit_card`).
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                transfer_to_account_id:
                  type: string
                  description: |
                    Альтернатива query-параметру. Счёт-приёмник остатка.
      responses:
        '204':
          description: Счёт удалён
        '400':
          description: |
            Нет счёта-приёмника при положительном балансе `cash` / `bank` (`ERR_ACCOUNT_TRANSFER_REQUIRED`),
            кредитная карта не погашена (`ERR_CREDIT_CARD_ARCHIVE_NOT_FULLY_PAID`) и др.
  /accounts/{id}/archive:
    post:
      summary: Архивировать счёт
      description: |
        Переводит счёт в `status=archived`. Если счёт был основным — флаг снимается, основным назначается
        следующий активный. В UI — пункт «Архивировать» в меню «⋯» на `/accounts` и на странице счёта.

        Для счетов `cash` / `bank` с `balance > 0` обязателен `transfer_to_account_id` (query или JSON body):
        перед архивацией создаётся перевод всей суммы на указанный активный счёт (категория «Перевод»,
        комментарий `Архивация счёта "{name}"`).

        Для `credit_card` перевод не выполняется. Архивация возможна только при полном погашении
        (`balance >= credit_limit`); иначе `ERR_CREDIT_CARD_ARCHIVE_NOT_FULLY_PAID`.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: transfer_to_account_id
          in: query
          schema:
            type: string
          description: |
            Счёт-приёмник остатка. Обязателен при `balance > 0` у архивируемого счёта `cash` / `bank`.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                transfer_to_account_id:
                  type: string
                  description: |
                    Альтернатива query-параметру. Счёт-приёмник остатка.
      responses:
        '200':
          description: Счёт архивирован
        '400':
          description: |
            Нет счёта-приёмника при положительном балансе (`ERR_ACCOUNT_TRANSFER_REQUIRED`),
            кредитная карта не погашена (`ERR_CREDIT_CARD_ARCHIVE_NOT_FULLY_PAID`) и др.
  /accounts/{id}/unarchive:
    post:
      summary: Восстановить счёт из архива
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Счёт восстановлен
  /accounts/{id}/primary:
    post:
      summary: Назначить основной счёт
      description: Снимает флаг с прежнего основного среди активных счетов. Архивный счёт назначить нельзя.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Счёт с `is_primary: true`"
        '400':
          description: Архивный счёт
  /accounts/summary:
    get:
      summary: Сводка по активным счетам
      description: Баланс и прогноз по каждому активному счёту, итоги.
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Сводка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsSummary'
  /accounts/{id}/balance:
    get:
      summary: Баланс и прогноз счёта
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Баланс счёта
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalanceSummary'
        '404':
          description: Счёт не найден
  /dashboard:
    get:
      summary: Главный экран
      description: |
        Общий баланс, карточки счетов (с `type`, `bank_icon`), последние 10 операций.
        `forecast_balance` и `has_future_this_month` учитывают операции `kind=future`
        в рамках текущего месяца (по часовому поясу пользователя).
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Данные дашборда
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Dashboard'
  /version/check:
    get:
      summary: Проверка доступного обновления
      description: |
        Сравнивает текущую версию приложения с последним релизом на GitHub.
        Ответ кешируется на сервере 24 часа. Веб-клиент запрашивает endpoint не чаще одного раза в сутки.
        Модальное предупреждение (бэкап, release notes, ссылка на **Настройки → Админка → Бекапы**) показывается
        **только администраторам** при `update_available: true`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Результат проверки
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionCheckResponse'
              example:
                current_version: 1.2.1
                latest_version: 1.2.2
                update_available: true
                release_url: https://github.com/kai-zer-ru/buhgalter/releases/tag/v1.2.2
  /stats/summary:
    get:
      summary: Сводка статистики
      description: |
        Доход, расход, дельта и число операций за период с учётом фильтров.
        Перед расчётом активируются наступившие операции `kind=future`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsAccountId'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - $ref: '#/components/parameters/StatsSearch'
        - $ref: '#/components/parameters/StatsIncludeFuture'
      responses:
        '200':
          description: Сводка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsSummary'
        '400':
          description: Некорректный период (`ERR_PERIOD_DATE`)
  /stats/by-category:
    get:
      summary: Статистика по категориям
      description: |
        Агрегация по категориям: сумма, доля от оборота категорий **того же типа** (доход или расход), число операций.
        Используется блоком «По категориям» на странице `/stats` (раздельно для доходов и расходов).
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsAccountId'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - $ref: '#/components/parameters/StatsSearch'
      responses:
        '200':
          description: Список категорий
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsCategoryItem'
        '400':
          description: Некорректный период
  /stats/by-subcategory:
    get:
      summary: Статистика по подкатегориям
      description: |
        Агрегация по подкатегориям с привязкой к родительской категории.
        В веб-интерфейсе `/stats` не отображается; endpoint доступен для API-клиентов.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsAccountId'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - $ref: '#/components/parameters/StatsSearch'
      responses:
        '200':
          description: Список подкатегорий
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsSubcategoryItem'
        '400':
          description: Некорректный период
  /stats/by-period:
    get:
      summary: Статистика по периодам
      description: |
        Агрегирует доход и расход по периодам с учётом timezone пользователя.
        Элементы `items` отсортированы по полю `period` **от новых к старым** (убывание ISO-даты).
        Для `week` начало недели — понедельник; для `month` — первое число месяца.
        В веб-UI подписи периодов форматируются для чтения (см. [ui-stats.md](../ui-stats.md)); API возвращает технические ключи.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: group_by
          in: query
          schema:
            type: string
            enum: [day, week, month]
            default: day
          description: Группировка периодов
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsAccountId'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - $ref: '#/components/parameters/StatsSearch'
      responses:
        '200':
          description: Доход и расход по периодам
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StatsPeriodItem'
        '400':
          description: Некорректный период или `group_by` (`ERR_GROUP_BY`, `ERR_PERIOD_DATE`)
  /stats/search:
    get:
      summary: Поиск операций в статистике
      description: |
        Список операций по подстроке в `description` с теми же фильтрами, что и сводка.
        Формат ответа — как у `GET /transactions`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Подстрока в описании
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsAccountId'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Страница операций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionList'
        '400':
          description: Некорректный период
  /stats/context:
    get:
      summary: Контекстная сводка
      description: |
        Сводка для контекста: счёт (`account_id`), должник (`debtor_id`), кредит (`credit_id`)
        или все долги (`debts=1`). Без scope-параметров — общая сводка.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
        - name: debtor_id
          in: query
          schema:
            type: string
        - name: credit_id
          in: query
          schema:
            type: string
        - name: debts
          in: query
          schema:
            type: string
            enum: ['1']
          description: Сводка по долгам (без id)
        - $ref: '#/components/parameters/StatsFrom'
        - $ref: '#/components/parameters/StatsTo'
        - $ref: '#/components/parameters/StatsType'
        - $ref: '#/components/parameters/StatsCategoryId'
        - $ref: '#/components/parameters/StatsKind'
        - $ref: '#/components/parameters/StatsSearch'
      responses:
        '200':
          description: Контекстная сводка
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsContextSummary'
        '400':
          description: Некорректный период
  /transactions:
    get:
      summary: Список операций
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: account_id
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense, transfer]
        - name: category_id
          in: query
          schema:
            type: string
        - name: kind
          in: query
          schema:
            type: string
            enum: [manual, future]
        - name: from
          in: query
          description: Начало периода (UTC, `YYYY-MM-DD HH:MM:SS`)
          schema:
            type: string
        - name: to
          in: query
          description: Конец периода (UTC)
          schema:
            type: string
        - name: search
          in: query
          description: Подстрока в description
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [date_asc, date_desc]
            default: date_desc
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Страница операций
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionList'
        '400':
          description: Некорректный формат даты периода
    post:
      summary: Создать доход или расход
      security:
        - sessionCookie: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCreate'
      responses:
        '201':
          description: Операция создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: |
            Ошибка валидации.
            Для системных категорий (`category.is_system=true`) запрещено создавать плановые операции (`kind=future`);
            возвращается сообщение по ключу `ERR_SYSTEM_CATEGORY_PLANNED`.
  /categories:
    get:
      summary: Список категорий
      description: |
        Сервер кеширует ответ in-memory (TTL 5 мин); кеш сбрасывается при POST/PUT/DELETE
        категорий и подкатегорий, reorder и set primary.
      security:
        - sessionCookie: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [income, expense]
      responses:
        '200':
          description: Список категорий
    post:
      summary: Создать категорию
      security:
        - sessionCookie: []
      responses:
        '201':
          description: Категория создана
  /categories/order:
    put:
      summary: Сохранить порядок категорий
      description: "Тело `{ \"type\": \"expense\"|\"income\", \"ids\": [\"uuid\", ...] }` — полный список id в нужном порядке."
      security:
        - sessionCookie: []
      responses:
        '200':
          description: Обновлённый список категорий
  /categories/{id}:
    put:
      summary: Обновить категорию
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Категория обновлена
    delete:
      summary: Удалить категорию
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Категория удалена
  /categories/{id}/primary:
    post:
      summary: Назначить главную категорию
      description: Одна главная на пользователя и тип (`expense` / `income`). Используется по умолчанию при добавлении операции.
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: "Категория с `is_primary: true`"
  /categories/{id}/subcategories:
    get:
      summary: Список подкатегорий
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Подкатегории
    post:
      summary: Создать подкатегорию
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Подкатегория создана
  /categories/{id}/subcategories/order:
    put:
      summary: Сохранить порядок подкатегорий
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Обновлённый список подкатегорий
  /subcategories/{id}:
    put:
      summary: Переименовать подкатегорию
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Подкатегория обновлена
    delete:
      summary: Удалить подкатегорию
      security:
        - sessionCookie: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Подкатегория удалена
  /debts/summary:
    get:
      summary: Сводка по активным долгам
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Итоги
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtsSummary'
  /debts:
    get:
      summary: Список долгов
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: settled
          in: query
          schema:
            type: string
            enum: ['true', 'false']
      responses:
        '200':
          description: Список
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Debt'
    post:
      summary: Создать долг
      description: |
        Создаёт запись долга; при `affects_balance=true` — связанную операцию в категории «Долги».

        **Один должник — одно направление:** у человека не может быть одновременно активных (`is_settled=false`)
        долгов `lent` и `borrowed`. Повтор той же стороны (ещё одна выдача / ещё одно взятие) — разрешён.
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '201':
          description: Создан
        '409':
          description: |
            Конфликт направления — нельзя «взять в долг» при активном «дал в долг» у того же должника
            и нельзя «дать в долг» при активном «взял в долг».
  /debtors:
    get:
      summary: Список должников
      description: |
        Сервер кеширует ответ in-memory (TTL 5 мин); кеш сбрасывается при `POST /debtors`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '200':
          description: Список
    post:
      summary: Создать должника
      security:
        - sessionCookie: []
        - bearerAuth: []
      responses:
        '201':
          description: Создан
  /debtors/{id}:
    get:
      summary: Должник — сводка, долги и связанные операции
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
