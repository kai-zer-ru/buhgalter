            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCreditRequest'
      responses:
        '200':
          description: Обновлённый кредит
    delete:
      summary: Удалить кредит
      description: |
        Query `mode=cascade` — отвязать `credit_payments.transaction_id`, удалить связанные операции, удалить кредит.
        `mode=keep_transactions` — операции остаются, описание дополняется «(кредит удалён)», отвязать `transaction_id`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          schema:
            type: string
            enum: [cascade, keep_transactions]
            default: cascade
      responses:
        '204':
          description: Удалён
  /credits/{id}/payments:
    post:
      summary: Оплата ближайшего платежа по графику
      description: |
        Обновляет ближайший неоплаченный `scheduled` (не создаёт новую строку).
        Если у строки уже есть `transaction_id` (создан при `create_transactions`) — переиспользует операцию.
        После оплаты удаляются дубликаты на тот же календарный день (`early`, лишние `scheduled`).
        Если `payment_date` в будущем, связанная операция остаётся `kind=future`
        до наступления даты операции и учитывается в прогнозе баланса.
        Опциональный `account_id` задаёт счёт только для операции этой оплаты;
        основной счёт кредита (`debit_account_id`) не меняется.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PayCreditPaymentRequest'
      responses:
        '200':
          description: Кредит после платежа
  /credits/{id}/payments/{paymentId}:
    delete:
      summary: Удалить строку графика
      description: |
        Нельзя для `kind=retroactive`.
        Для `scheduled` удаление разрешено только для последнего оплаченного платежа:
        платёж восстанавливается как неоплаченный `scheduled`, связанная операция удаляется,
        `paid_amount` уменьшается.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Кредит после удаления
  /credits/{id}/close:
    post:
      summary: Завершить кредит
      description: |
        Завершает кредит (`status=closed`). При остатке > 0 тело обязательно.
        `affects_balance=true` — операция expense на остаток; `false` — операция expense с `affects_balance=0` (в статистике, без влияния на баланс счёта).
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteCreditRequest'
      responses:
        '200':
          description: Завершённый кредит
  /credits/{id}/schedule:
    get:
      summary: График платежей
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Массив платежей
    patch:
      summary: Изменить суммы неоплаченных платежей
      description: |
        Меняет `amount` только у строк с `kind=scheduled` и `is_applied=false`.
        Если у строки есть связанная будущая операция (`kind=future`), обновляет и её сумму.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
