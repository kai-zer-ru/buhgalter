  /transactions/{id}:
    get:
      summary: Получить операцию
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Операция
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '404':
          description: Не найдена
    put:
      summary: Обновить доход или расход
      description: |
        Переводы обновляются через `PUT /transfers/{group_id}`.
        Операции с `credit_payment_linked=true` редактируются через кредит, не через этот endpoint.
        Поле `type` должно совпадать с существующей операцией — иначе `ERR_TX_TYPE_CHANGE`.
        Если `transaction_date` в будущем (в TZ пользователя), `kind` становится `future`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionUpdate'
      responses:
        '200':
          description: Операция обновлена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
        '400':
          description: |
            Ошибка валидации.
            Для системных категорий (`category.is_system=true`) запрещено сохранять плановые операции (`kind=future`);
            возвращается сообщение по ключу `ERR_SYSTEM_CATEGORY_PLANNED`.
            Смена типа операции — `ERR_TX_TYPE_CHANGE`.
        '404':
          description: Не найдена
    delete:
      summary: Удалить операцию
      description: |
        Удаляет операцию; баланс счёта меняется на противоположную сумму (расход → плюс, доход → минус).
        Начальную (`open`) операцию долга нельзя удалить, если есть другие операции по этому долгу — `409 Conflict`.
        Единственную начальную операцию можно удалить — долг удаляется вместе с ней.
        Операцию погашения (`settle`) можно удалить — остаток долга пересчитывается.
        Операция кредита — откат платежа (`scheduled`/`auto` → «Ожидает») или удаление legacy `early`; уменьшается `paid_amount`.
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Удалена
        '404':
          description: Не найдена
        '409':
          description: Начальную операцию долга нельзя удалить при наличии других операций по долгу
  /transactions/{id}/activate:
    post:
      summary: Активировать плановую операцию
      description: "`kind: future` → `manual` (для тестов и ручной активации)."
      security:
        - sessionCookie: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
