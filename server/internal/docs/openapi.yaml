            списать расход со счёта `debit_account_id`. Только при `added_retroactively=true`.
            Не больше числа прошлых платежей в графике.
        principal_affects_balance:
          type: boolean
          description: >
            Только для consumer с interest_rate &gt; 0. Если true — доход на сумму кредита
            на `debit_account_id` в дату выдачи. Недоступно, если в графике есть платёж
            с датой раньше начала текущих суток (TZ пользователя).
        create_transactions:
          type: boolean
          description: >
            Создать операции expense для неоплаченных scheduled-платежей (по умолчанию true).
            Прошлые/сегодня — is_applied=1; будущие — kind=future, is_applied=0.
            В UI («Оплатить автоматически») скрыт и принудительно false при added_retroactively=true.
        schedule_seed:
          type: array
          description: Полный или частичный график. Обязателен при `payment_interval=manual`.
          items:
            type: object
            properties:
              payment_date:
                type: string
              amount:
                oneOf:
                  - type: string
                  - type: integer
    UpdateCreditRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
        monthly_payment:
          nullable: true
          oneOf:
            - type: string
            - type: integer
        debit_account_id:
          type: string
          nullable: true
        debit_time_local:
          type: string
          nullable: true
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: Локальное время автосписания в формате HH:MM; пустая строка отключает автосписание
        bank_id:
          type: string
          nullable: true
          description: ID банка; допускается null для очистки поля
    BudgetItem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        scope:
          type: string
          enum: [category, subcategory, all_expense]
        category_id:
          type: string
          nullable: true
        category_name:
          type: string
          nullable: true
        category_icon:
          type: string
          nullable: true
        subcategory_id:
          type: string
          nullable: true
        subcategory_name:
          type: string
          nullable: true
        account_id:
          type: string
          nullable: true
        account_name:
          type: string
          nullable: true
        amount:
          type: integer
          description: Лимит в копейках
        amount_display:
          type: string
        period:
          type: string
          enum: [month]
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
          description: Календарный месяц бюджета (YYYY-MM)
        copy_forward:
          type: boolean
          description: Авто-копирование на следующий месяц при первом открытии
        alert_at_percent:
          type: integer
          description: Порог уведомления; по умолчанию 90
        is_active:
          type: boolean
        created_at:
          type: string
        updated_at:
          type: string
    BudgetSummaryItem:
      allOf:
        - $ref: '#/components/schemas/BudgetItem'
        - type: object
          properties:
            planned:
              type: integer
            planned_display:
              type: string
            spent:
              type: integer
            spent_display:
              type: string
            remaining:
              type: integer
            remaining_display:
              type: string
            percent:
              type: integer
            status:
              type: string
              enum: [ok, warning, exceeded]
            period_start:
              type: string
            copy_forward:
              type: boolean
            children_planned:
              type: integer
              description: Сумма planned дочерних бюджетов (только all_expense)
            children_planned_display:
              type: string
            children_spent:
              type: integer
            children_spent_display:
              type: string
    BudgetSummaryResponse:
      type: object
      properties:
        month:
          type: string
          pattern: '^\d{4}-\d{2}$'
        can_copy_from_previous:
          type: boolean
          description: true, если в выбранном месяце нет бюджетов, а в предыдущем есть
        items:
          type: array
          items:
            $ref: '#/components/schemas/BudgetSummaryItem'
    BudgetUpsertRequest:
      type: object
      required: [name, scope, amount]
      properties:
        name:
          type: string
        scope:
          type: string
          enum: [category, subcategory, all_expense]
        category_id:
          type: string
        subcategory_id:
          type: string
        account_id:
          type: string
        amount:
          type: string
          description: Сумма в рублях с дробной частью
        alert_at_percent:
          type: integer
          minimum: 0
          maximum: 100
          default: 90
        is_active:
          type: boolean
        copy_forward:
          type: boolean
          default: false
    RecurringOperation:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [income, expense]
        amount:
          type: integer
        amount_display:
          type: string
        description:
          type: string
          nullable: true
        account_id:
          type: string
        account_name:
          type: string
        category_id:
          type: string
        category_name:
          type: string
        subcategory_id:
          type: string
          nullable: true
        subcategory_name:
          type: string
          nullable: true
        period:
          type: string
          enum: [week, two_weeks, month, year]
        weekday:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Обязателен для периодов week/two_weeks
        day_of_month:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
          description: |
            Обязателен для периодов month/year.
            В UI для `month` берётся из дня `start_date` автоматически (поле отдельно не показывается).
        start_date:
          type: string
          format: date-time
        time_local:
          type: string
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: Локальное время выполнения (HH:MM), по умолчанию 08:00
        next_run_at:
          type: string
          format: date-time
        last_run_at:
          type: string
          nullable: true
          format: date-time
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RecurringOperationUpsertRequest:
      type: object
      required: [type, amount, account_id, category_id, period, start_date]
      properties:
        type:
          type: string
          enum: [income, expense]
        amount:
          oneOf:
            - type: string
            - type: integer
        description:
          type: string
          nullable: true
        account_id:
          type: string
        category_id:
          type: string
        subcategory_id:
          type: string
          nullable: true
        period:
          type: string
          enum: [week, two_weeks, month, year]
        weekday:
          type: integer
          nullable: true
          minimum: 1
          maximum: 7
          description: Обязателен для периодов week/two_weeks
        day_of_month:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
          description: Обязателен для периодов month/year
        start_date:
          type: string
          format: date-time
        time_local:
          type: string
          nullable: true
          pattern: '^([01]\d|2[0-3]):([0-5]\d)$'
          description: Локальное время выполнения (HH:MM), пустое значение трактуется как 08:00
        active:
          type: boolean
    PreviewScheduleRequest:
      type: object
      required: [principal, term, issue_date]
      properties:
        principal:
          oneOf:
            - type: string
            - type: integer
          description: Сумма кредита в копейках (для ипотеки — уже `property_price - down_payment`)
        credit_kind:
          type: string
          enum: [consumer, mortgage]
          default: consumer
        term:
          type: integer
          description: Срок в месяцах (или число платежей для week/two_weeks/manual)
        interest_rate:
          type: number
          description: Годовая ставка, % (0 — рассрочка)
        payment_interval:
          type: string
          enum: [month, week, two_weeks, manual]
          description: Для credit_kind=mortgage допустимо только значение month
        issue_date:
          type: string
          description: Дата выдачи, UTC `YYYY-MM-DD HH:MM:SS`
        monthly_payment:
          nullable: true
          oneOf:
            - type: string
            - type: integer
          description: |
            Опциональный override ежемесячного платежа (копейки). Для mortgage — сумма из договора банка;
            для consumer — с проверкой на min/max. Пусто/null — автоматический расчёт.
        seed_payments:
          type: array
          description: Обязателен при payment_interval=manual (ровно term элементов)
          items:
            type: object
            properties:
              payment_date:
                type: string
              amount:
                oneOf:
                  - type: string
                  - type: integer
    PreviewScheduleResponse:
      type: object
      required: [schedule_preview, calculated_monthly_payment, calculated_monthly_payment_display]
      properties:
        schedule_preview:
          type: array
          items:
            type: object
            required: [payment_date, amount]
            properties:
              payment_date:
                type: string
                description: UTC, YYYY-MM-DD HH:MM:SS
              amount:
                type: integer
                description: Сумма платежа в копейках
        calculated_monthly_payment:
          type: integer
          description: Расчётный равный платёж в копейках (до override monthly_payment)
        calculated_monthly_payment_display:
          type: string
          description: Форматированная сумма для UI (например «600 576,47 ₽»)
    ImportReport:
      type: object
      properties:
        total_rows:
          type: integer
        processed_rows:
          type: integer
          description: Сколько строк уже обработано (для async progress)
        valid_rows:
          type: integer
        skipped_duplicates:
          type: integer
        created_transactions:
          type: integer
        errors:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              message:
                type: string
        logs:
          type: array
          description: Построчный лог импорта (используется в UI-спойлере полного лога)
          items:
            type: string
        preview:
          type: array
          items:
            type: object
            properties:
              row:
                type: integer
              action:
                type: string
              account:
                type: string
              amount:
                type: integer
              date:
                type: string
        accounts_to_create:
          type: array
          items:
            type: string
        account_mappings:
          type: array
          items:
            type: object
            properties:
              file_name:
                type: string
              mode:
                type: string
                enum: [create, existing]
              account_id:
                type: string
              account_name:
                type: string
              account_type:
                type: string
                enum: [cash, bank, credit_card]
                description: Предлагаемый тип при mode=create
              bank_id:
                type: string
                description: ID банка при account_type=bank или credit_card
              credit_limit:
                type: string
                description: Лимит карты, рубли; обязателен при account_type=credit_card и mode=create
        categories_to_create:
          type: array
          items:
            type: string
        category_mappings:
          type: array
          items:
            type: object
            properties:
              file_name:
                type: string
              type:
                type: string
                enum: [expense, income]
              mode:
                type: string
                enum: [create, existing]
              category_id:
                type: string
              category_name:
                type: string
        subcategory_mappings:
          type: array
          items:
            type: object
            properties:
              file_category:
                type: string
              file_subcategory:
                type: string
              type:
                type: string
                enum: [expense, income]
              mode:
                type: string
                enum: [create, existing]
              subcategory_id:
                type: string
              subcategory_name:
                type: string
    ImportJob:
      type: object
      required: [id, filename, status, created_at]
      properties:
        id:
          type: string
        filename:
          type: string
        status:
          type: string
          enum: [queued, running, done, failed]
        error_message:
          type: string
          nullable: true
        report:
          $ref: '#/components/schemas/ImportReport'
        created_at:
          type: string
        started_at:
          type: string
          nullable: true
        finished_at:
          type: string
          nullable: true
    APIToken:
      type: object
      required: [id, name, token_prefix, created_at]
      properties:
        id:
          type: string
        name:
          type: string
        token_prefix:
          type: string
        expires_at:
          type: string
          format: date-time
          nullable: true
          description: "null — бессрочный токен"
        last_used_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
    APITokenCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        never_expires:
          type: boolean
          default: false
          description: Бессрочный токен (не рекомендуется)
        expires_at:
          type: string
          format: date-time
          description: "Явная дата истечения (RFC3339); игнорируется при never_expires: true"
    APITokenCreated:
      allOf:
        - $ref: '#/components/schemas/APIToken'
        - type: object
          required: [token]
          properties:
            token:
              type: string
              description: Полное значение токена (только в ответе на создание)
            never_expires:
              type: boolean
              description: "true, если токен бессрочный"
