version: "2"
sql:
  - engine: "sqlite"
    queries: "queries"
    schema: "schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
