version: 2
project_name: buhgalter

before:
  hooks:
    - npm ci --prefix web
    - python3 scripts/build_category_icons_json.py
    - make web-build copy-static copy-openapi
    - bash scripts/render-release-env.sh "{{ .Version }}"

builds:
  - id: buhgalter
    dir: server
    main: ./cmd/buhgalter
    binary: buhgalter
    tags:
      - embedstatic
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.installMethod=release
      - -X main.buildCommit={{.Commit}}
      - -X main.buildTime={{.Date}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: false

release:
  github:
    owner: kai-zer-ru
    name: buhgalter
  replace_existing_artifacts: true
  extra_files:
    - glob: docker/docker-compose.yml
      name_template: docker-compose.yaml
    - glob: build/release/.env.example
      name_template: .env.example
    - glob: android/app/build/outputs/apk/release/app-release.apk
      name_template: buhgalter-android-{{ .Version }}.apk
    - glob: android/app/build/outputs/apk/release/app-arm64-v8a-release.apk
      name_template: buhgalter-android-{{ .Version }}-arm64-v8a.apk
    - glob: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk
      name_template: buhgalter-android-{{ .Version }}-armeabi-v7a.apk
    - glob: android/app/build/outputs/apk/release/app-x86_64-release.apk
      name_template: buhgalter-android-{{ .Version }}-x86_64.apk
  header: |
    {{ .Env.RELEASE_CHANGELOG }}

    ---

    ## Коммиты
  footer: |
    ## Docker

    Вложения **docker-compose.yaml**, **.env** и **.env.example** — compose из репозитория; `.env` с `BUHGALTER_IMAGE_TAG={{ .Version }}`. При необходимости: `cp .env.example .env`.

    ```bash
    docker pull ghcr.io/kai-zer-ru/buhgalter:{{ .Version }}
    docker compose -f docker-compose.yaml up -d
    ```

    Или без compose:

    ```bash
    docker run -d --name buhgalter \
      -p 8765:8765 \
      -v buhgalter-data:/app/data \
      -v buhgalter-backups:/app/backups \
      --restart unless-stopped \
      ghcr.io/kai-zer-ru/buhgalter:{{ .Version }}
    ```

    ## Android

    Вложения **`buhgalter-android-{{ .Version }}.apk`** (universal) и **`buhgalter-android-{{ .Version }}-{abi}.apk`** (`arm64-v8a`, `armeabi-v7a`, `x86_64`). Минимальная версия Android — 8.0 (API 26). Установка поверх предыдущей версии сохраняет данные приложения (URL сервера, токен в secure storage).
