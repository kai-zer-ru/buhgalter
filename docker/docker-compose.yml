services:
  buhgalter:
    # Production: pull from GHCR (see docs/install/docker.md)
    image: ghcr.io/kai-zer-ru/buhgalter:${BUHGALTER_IMAGE_TAG:-latest}
    # Local build:
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    env_file:
      - .env
    environment:
      BUHGALTER_ENV_FILE: /app/.env
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - ${BUHGALTER_HOST_DATA_DIR:-./data}:/app/data
      - ${BUHGALTER_HOST_BACKUPS_DIR:-./backups}:/app/backups
      - ${BUHGALTER_HOST_LOGS_DIR:-./logs}:/app/logs
      - ./.env:/app/.env
      # Optional: override bundled locales
      # - ../server/locales:/app/locales:ro
    restart: unless-stopped
